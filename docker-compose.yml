services:
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: unless-stopped
    networks:
      - traefik_proxy
    # ports:
    #   - "3000:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.excalidraw_web.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.excalidraw_web.entrypoints=web,websecure"
      # - "traefik.http.routers.excalidraw_web.tls=true"
      - "traefik.http.routers.excalidraw_web.tls.certresolver=myresolver"
      - "traefik.http.services.excalidraw_web.loadbalancer.server.port=80"

      # ---------------------
      - "traefik.http.routers.excalidraw-www.rule=Host(`www.${DOMAIN_NAME}`)"
      - "traefik.http.routers.excalidraw-www.entrypoints=websecure"
      # - "traefik.http.routers.excalidraw-www.tls=true"
      - "traefik.http.routers.excalidraw-www.tls.certresolver=myresolver"
      - "traefik.http.routers.excalidraw-www.middlewares=excalidraw-www-redirect@docker"

      - "traefik.http.middlewares.excalidraw-www-redirect.redirectregex.regex=^https://www\\.${DOMAIN_NAME}(.*)"
      - "traefik.http.middlewares.excalidraw-www-redirect.redirectregex.replacement=https://${DOMAIN_NAME}$${1}"
      - "traefik.http.middlewares.excalidraw-www-redirect.redirectregex.permanent=true"
  
networks:
  traefik_proxy:
    external: true